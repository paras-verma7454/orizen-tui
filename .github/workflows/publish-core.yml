name: Publish Core

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check relevant changes
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git rev-parse "${GITHUB_SHA}^" >/dev/null 2>&1; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "${GITHUB_SHA}^" "${GITHUB_SHA}" -- \
            packages/core \
            bun.lock \
            package.json \
            tsconfig.json; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip publish (no relevant changes)
        if: steps.changes.outputs.should_publish != 'true'
        run: echo "No Core-related changes detected. Skipping publish."

      - uses: oven-sh/setup-bun@v2
        if: steps.changes.outputs.should_publish == 'true'
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.should_publish == 'true'
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.changes.outputs.should_publish == 'true'
        run: bun install --frozen-lockfile

      - name: Build Core
        if: steps.changes.outputs.should_publish == 'true'
        run: bun run --filter './packages/core' build

      - name: Verify package contents
        if: steps.changes.outputs.should_publish == 'true'
        run: npm pack --dry-run
        working-directory: packages/core

      - name: Publish to npm
        if: steps.changes.outputs.should_publish == 'true'
        run: npm publish --provenance --access public
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
